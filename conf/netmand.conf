; netmand — example configuration
; INI format, reloaded on SIGHUP

[daemon]
log_level   = info          ; debug | info | warn | error
log_sinks   = syslog,stderr ; syslog | stderr | file | callback (comma-separated)
log_file    = log/netmand.log
shm_path    = netmand_state
socket_path = netmand.sock

[eth0]
method  = dhcp              ; static | dhcp
; if method = static:
; address = 192.168.1.10
; prefix  = 24
; gateway = 192.168.1.1

[eth0.ipv6]
method  = slaac             ; static | dhcpv6 | slaac | off
; if method = static:
; address = 2001:db8::1
; prefix  = 64

; Example static interface
; [eth1]
; method  = static
; address = 10.0.0.1
; prefix  = 24
